services:
  # Polling REST
  rest-poller:
    build: ./ingestion
    platform: linux/amd64
    command: ["python", "-u", "rest_poller.py"]
    depends_on:
      - simulator
      - activemq
    environment:
      - BROKER_HOST=activemq

  # Streaming SSE
  stream-subscriber:
    build: ./ingestion
    platform: linux/amd64
    command: ["python", "-u", "stream_subscriber.py"]
    depends_on:
      - simulator
      - activemq
    environment:
      - BROKER_HOST=activemq

  # Esecutore Comandi (Consumer)
  actuator-executor:
    build: ./ingestion
    platform: linux/amd64
    command: ["python", "-u", "consumer.py"]
    depends_on:
      - simulator
      - activemq
    environment:
      - BROKER_HOST=activemq
      - SIMULATOR_HOST=simulator
    restart: always

  # Il simulatore fornito dal prof
  simulator:
    image: mars-iot-simulator:latest
    platform: linux/amd64
    ports:
      - "8080:8080"

  # Il Broker ActiveMQ
  activemq:
    image: apache/activemq-classic:latest
    platform: linux/amd64
    ports:
      - "61613:61613"
      - "8161:8161"
    environment:
      - ACTIVEMQ_ADMIN_USER=admin
      - ACTIVEMQ_ADMIN_PASSWORD=admin